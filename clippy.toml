# Clippy configuration for seriousum

allow-unwrap-in-tests = true
allow-dbg-in-tests = true

# Disallow certain patterns in production code
disallowed-methods = [
    # Use anyhow::Result for error handling
    "std::process::exit",
    # Use tracing instead of println
    "std::io::_print",
    "core::fmt::write",
]
