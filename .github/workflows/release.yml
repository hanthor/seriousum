name: Release Distribution

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  USERNAME: hanthor

jobs:
  build-containers:
    name: Build & Push Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          file: images/agent.Dockerfile
          push: true
          tags: |
            ghcr.io/hanthor/seriousum/agent:${{ steps.version.outputs.VERSION }}
            ghcr.io/hanthor/seriousum/agent:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push operator image
        uses: docker/build-push-action@v5
        with:
          file: images/operator.Dockerfile
          push: true
          tags: |
            ghcr.io/hanthor/seriousum/operator:${{ steps.version.outputs.VERSION }}
            ghcr.io/hanthor/seriousum/operator:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push tools image
        uses: docker/build-push-action@v5
        with:
          file: images/tools.Dockerfile
          push: true
          tags: |
            ghcr.io/hanthor/seriousum/tools:${{ steps.version.outputs.VERSION }}
            ghcr.io/hanthor/seriousum/tools:latest
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.VERSION }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

  build-binaries:
    name: Build Multi-Platform Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            x86_64-unknown-linux-gnu
            aarch64-unknown-linux-gnu
            x86_64-apple-darwin
            aarch64-apple-darwin

      - name: Build Linux x86_64
        run: cargo build --release --target x86_64-unknown-linux-gnu --bins

      - name: Build Linux ARM64
        run: cargo build --release --target aarch64-unknown-linux-gnu --bins

      - name: Create Linux x86_64 archive
        run: |
          mkdir -p seriousum-linux-x86_64
          cp target/x86_64-unknown-linux-gnu/release/seriousum-daemon seriousum-linux-x86_64/
          cp target/x86_64-unknown-linux-gnu/release/seriousum-cli seriousum-linux-x86_64/cilium
          cp target/x86_64-unknown-linux-gnu/release/cilium-dbg seriousum-linux-x86_64/
          cp target/x86_64-unknown-linux-gnu/release/seriousum-operator seriousum-linux-x86_64/
          tar czf seriousum-linux-x86_64.tar.gz seriousum-linux-x86_64/

      - name: Create Linux ARM64 archive
        run: |
          mkdir -p seriousum-linux-arm64
          cp target/aarch64-unknown-linux-gnu/release/seriousum-daemon seriousum-linux-arm64/
          cp target/aarch64-unknown-linux-gnu/release/seriousum-cli seriousum-linux-arm64/cilium
          cp target/aarch64-unknown-linux-gnu/release/cilium-dbg seriousum-linux-arm64/
          cp target/aarch64-unknown-linux-gnu/release/seriousum-operator seriousum-linux-arm64/
          tar czf seriousum-linux-arm64.tar.gz seriousum-linux-arm64/

      - name: Generate checksums
        run: sha256sum seriousum-*.tar.gz > SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: seriousum-binaries
          path: |
            seriousum-*.tar.gz
            SHA256SUMS

  create-release:
    name: Create GitHub Release
    needs: [build-containers, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: seriousum-binaries

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release Notes
        id: notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Seriousum ${{ steps.version.outputs.VERSION }}

          ### What's New
          - ✅ 24 core Cilium components ported to Rust
          - ✅ 872 comprehensive unit tests
          - ✅ Full Cilium test compatibility

          ### Installation

          #### Container
          ```bash
          docker pull ghcr.io/hanthor/seriousum/agent:${{ steps.version.outputs.VERSION }}
          ```

          #### Helm
          ```bash
          helm repo add seriousum https://github.com/hanthor/seriousum
          helm install cilium seriousum/seriousum -n kube-system
          ```

          #### Binary
          ```bash
          curl -L https://github.com/hanthor/seriousum/releases/download/${{ steps.version.outputs.VERSION }}/seriousum-linux-x86_64.tar.gz | tar xz
          sudo mv seriousum-linux-x86_64/* /usr/local/bin/
          ```

          ### Compatibility
          - Cilium version: 1.15+
          - Kubernetes: 1.25+
          - Linux kernel: 5.8+

          ### Testing Results
          See [compatibility report](https://github.com/hanthor/seriousum/wiki/v${{ steps.version.outputs.VERSION }}-Compatibility)

          EOF
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            seriousum-*.tar.gz
            SHA256SUMS
          body_path: release-notes.md
          draft: false
          prerelease: contains(github.ref, '-alpha') || contains(github.ref, '-beta')
