name: Benchmarks

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/archive/**'
      - '*.md'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      skip-kind:
        description: 'Skip kind cluster benchmarks and only run micro-benchmarks'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark-and-publish:
    name: Run and publish benchmarks
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Install kind + kubectl + helm
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.27.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/
          curl -Lo ./kubectl https://dl.k8s.io/release/v1.33.1/bin/linux/amd64/kubectl
          chmod +x ./kubectl && sudo mv ./kubectl /usr/local/bin/
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Run benchmark publisher
        run: |
          if [[ "${{ inputs.skip-kind || false }}" == "true" ]]; then
            ./scripts/benchmark.sh --skip-kind
          else
            ./scripts/benchmark.sh
          fi

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            target/bench/results.json
            target/criterion/
            docs/generated/BENCHMARKS.md
            docs/generated/benchmark-results.json
          retention-days: 30

      - name: Commit published benchmark docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/generated/BENCHMARKS.md docs/generated/benchmark-results.json
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit"
          else
            git commit -m "chore: publish benchmark comparison [skip ci]"
            git push
          fi
